services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend-fastapi
    restart: unless-stopped
    environment:
      APP_NAME: "Junior Senior QA API"
      ENVIRONMENT: production
      # Required in production: generate with `openssl rand -hex 32`.
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Set AUTH_SECRET_KEY to a strong random value (openssl rand -hex 32)}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-blog4devs <onboarding@resend.dev>}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: community_qa
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      N8N_QUESTION_CREATED_WEBHOOK_URL: ${N8N_QUESTION_CREATED_WEBHOOK_URL:-}
      N8N_WEBHOOK_TIMEOUT_SECONDS: ${N8N_WEBHOOK_TIMEOUT_SECONDS:-5}
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build: ./frontend-next
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      # Same value as the backend; lets the Next server verify the JWT signature.
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Set AUTH_SECRET_KEY to a strong random value (openssl rand -hex 32)}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
