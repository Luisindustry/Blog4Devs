name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend-fastapi
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend-fastapi
        run: ruff check app/

      - name: Tests
        working-directory: backend-fastapi
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: community_qa_test
        run: pytest tests/ -v

  frontend:
    name: Frontend — type check & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        working-directory: frontend-next
        run: npm ci

      - name: Type check
        working-directory: frontend-next
        run: npx tsc --noEmit

      - name: Lint
        working-directory: frontend-next
        run: npm run lint

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install backend dependencies
        working-directory: backend-fastapi
        run: pip install -e "."

      - name: Start backend
        working-directory: backend-fastapi
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: community_qa_e2e
          FRONTEND_ORIGIN: http://localhost:3000
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl -f http://localhost:8000/healthz

      - name: Install frontend dependencies
        working-directory: frontend-next
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend-next
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: frontend-next
        env:
          CI: "true"
          API_BASE_URL: http://localhost:8000
          BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-next/playwright-report/
          retention-days: 7
